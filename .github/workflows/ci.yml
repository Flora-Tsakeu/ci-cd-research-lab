# .github/workflows/ci.yml
# ══════════════════════════════════════════════════════════════
# PIPELINE CI — MODULE 1
# Ce fichier définit QUAND, OÙ et COMMENT GitHub exécute
# nos vérifications automatiques.
# ══════════════════════════════════════════════════════════════

name: "CI Pipeline - Module 1"  # Nom affiché dans l'onglet Actions

# ── DÉCLENCHEURS ──────────────────────────────────────────────
# GitHub surveille ces événements sur le dépôt
on:
  push:
    branches:
      - main        # Déclenché à chaque push sur main
      - "feature/*" # ET sur toutes les branches feature/xxx
  pull_request:
    branches:
      - main        # ET quand une PR cible main

# ── JOBS ──────────────────────────────────────────────────────
# Un job = un ensemble d'étapes sur UNE machine virtuelle
jobs:

  # ── JOB 1 : TESTS UNITAIRES ─────────────────────────────────
  unit-tests:
    name: "Tests Unitaires"
    runs-on: ubuntu-latest  # Type de runner demandé à GitHub

    # Stratégie de matrice : teste sur 2 versions de Python
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:

      # ÉTAPE 1 : Récupérer le code source
      - name: "Checkout du code"
        uses: actions/checkout@v4
        # Cette action clone ton dépôt sur le runner

      # ÉTAPE 2 : Installer Python
      - name: "Installation de Python ${{ matrix.python-version }}"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"  # Met en cache les dépendances → builds plus rapides

      # ÉTAPE 3 : Installer les dépendances
      - name: "Installation des dépendances"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ÉTAPE 4 : Lancer les tests avec couverture de code
      - name: "Exécution des tests"
        run: |
          pytest tests/ \
            --verbose \
            --tb=short \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v

      # ÉTAPE 5 : Sauvegarder le rapport de couverture comme artefact
      - name: "Sauvegarde du rapport de couverture"
        uses: actions/upload-artifact@v4
        if: always()  # Exécuté même si les tests échouent
        with:
          name: "coverage-report-py${{ matrix.python-version }}"
          path: coverage.xml
          retention-days: 30  # Gardé 30 jours sur GitHub

  # ── JOB 2 : VÉRIFICATION QUALITÉ DU CODE ────────────────────
  code-quality:
    name: "Qualité du Code"
    runs-on: ubuntu-latest
    needs: []  # Pas de dépendance : s'exécute en parallèle

    steps:
      - name: "Checkout du code"
        uses: actions/checkout@v4

      - name: " Installation de Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: "Installation des outils qualité"
        run: pip install flake8

      - name: "Analyse statique (flake8)"
        run: |
          flake8 src/ tests/ \
            --max-line-length=100 \
            --statistics \
            --count