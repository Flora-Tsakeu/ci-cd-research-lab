# .github/workflows/ci.yml
# ══════════════════════════════════════════════════════════════
# PIPELINE CI — MODULE 1
# Ce fichier définit QUAND, OÙ et COMMENT GitHub exécute
# nos vérifications automatiques.
# ══════════════════════════════════════════════════════════════

name: "CI Pipeline - Module 1"  # Nom affiché dans l'onglet Actions

# ── DÉCLENCHEURS ──────────────────────────────────────────────
# GitHub surveille ces événements sur le dépôt
on:
  push:
    branches:
      - main        # Déclenché à chaque push sur main
      - "feature/*" # ET sur toutes les branches feature/xxx
  pull_request:
    branches:
      - main        # ET quand une PR cible main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # ← Élimine les warnings Node.js

# ── JOBS ──────────────────────────────────────────────────────
# Un job = un ensemble d'étapes sur UNE machine virtuelle
jobs:

  # ── JOB 1 : TESTS UNITAIRES ─────────────────────────────────
  unit-tests:
    name: "Tests Unitaires"
    runs-on: ubuntu-latest  # Type de runner demandé à GitHub

    # Stratégie de matrice : teste sur 2 versions de Python
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:

      # ÉTAPE 1 : Récupérer le code source
      - name: "Checkout du code"
        uses: actions/checkout@v4
        # Cette action clone ton dépôt sur le runner

      # ÉTAPE 2 : Installer Python
      - name: "Installation de Python ${{ matrix.python-version }}"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"  # Met en cache les dépendances → builds plus rapides

      # ÉTAPE 3 : Installer les dépendances
      - name: "Installation des dépendances"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ÉTAPE 4 : Lancer les tests avec couverture de code
      - name: "Exécution des tests"
        run: |
          pytest tests/ \
            --verbose \
            --tb=short \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v

      # ÉTAPE 5 : Sauvegarder le rapport de couverture comme artefact
      - name: "Sauvegarde du rapport de couverture"
        uses: actions/upload-artifact@v4
        if: always()  # Exécuté même si les tests échouent
        with:
          name: "coverage-report-py${{ matrix.python-version }}"
          path: coverage.xml
          retention-days: 30  # Gardé 30 jours sur GitHub

  # ── JOB 2 : MÉTRIQUES SYSTÈME DU RUNNER ─────────────────────
  system-metrics:
    name: "Métriques Système Runner"
    runs-on: ubuntu-latest
    needs: []  # Parallèle avec unit-tests

    steps:

      - name: "Checkout du code"
        uses: actions/checkout@v4

      - name: "Informations matérielles du runner"
        run: |
          echo "════════════════════════════════════"
          echo "     IDENTITÉ DU RUNNER GITHUB"
          echo "════════════════════════════════════"
          echo "Hostname      : $(hostname)"
          echo "OS            : $(uname -a)"
          echo "CPU cores     : $(nproc)"
          echo "RAM totale    : $(free -h | awk '/^Mem:/ {print $2}')"
          echo "Espace disque : $(df -h / | awk 'NR==2 {print $4}') disponible"

      - name: "Snapshot CPU + Mémoire (baseline)"
        run: |
          echo "── BASELINE AVANT LES OPÉRATIONS ──"
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "--- CPU (vmstat) ---"
          vmstat 1 3
          echo ""
          echo "--- MÉMOIRE DÉTAILLÉE ---"
          free -m
          echo ""
          echo "--- TOP 5 PROCESSUS PAR CPU ---"
          ps aux --sort=-%cpu | head -6

      - name: "Installation Python + dépendances"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "Simulation de charge + mesure en temps réel"
        run: |
          pip install -r requirements.txt psutil

          python3 - <<'EOF'
          import psutil
          import time
          import sys
          import os
          sys.path.insert(0, 'src')
          from calculator import ScientificCalculator

          print("═" * 50)
          print("  MÉTRIQUES TEMPS RÉEL — SÉRIE TEMPORELLE")
          print("═" * 50)
          print(f"{'Timestamp':<25} {'CPU%':>6} {'RAM_used_MB':>12} {'RAM%':>6}")
          print("-" * 55)

          calc = ScientificCalculator()
          start = time.time()

          for i in range(8):
              # Charge de calcul simulée
              for _ in range(50000):
                  calc.power(i + 1, 3.14)

              # Capture des métriques
              ts   = time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime())
              cpu  = psutil.cpu_percent(interval=0.5)
              mem  = psutil.virtual_memory()

              print(f"{ts:<25} {cpu:>6.1f} {mem.used // 1024**2:>12} {mem.percent:>6.1f}")

          elapsed = time.time() - start
          print("-" * 55)
          print(f"Durée totale : {elapsed:.2f}s")
          print(f"Opérations enregistrées : {len(calc.get_history())}")
          print("═" * 50)
          EOF

      - name: "Export métriques en CSV (artefact)"
        run: |
          python3 - <<'EOF'
          import psutil, time, csv, os

          rows = []
          for i in range(5):
              time.sleep(0.5)
              mem = psutil.virtual_memory()
              rows.append({
                  "timestamp": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
                  "cpu_percent": psutil.cpu_percent(interval=0.3),
                  "ram_used_mb": mem.used // 1024**2,
                  "ram_percent": mem.percent,
                  "ram_available_mb": mem.available // 1024**2,
              })

          os.makedirs("metrics", exist_ok=True)
          with open("metrics/runner_metrics.csv", "w", newline="") as f:
              w = csv.DictWriter(f, fieldnames=rows[0].keys())
              w.writeheader()
              w.writerows(rows)

          print("Fichier metrics/runner_metrics.csv généré")
          print(open("metrics/runner_metrics.csv").read())
          EOF

      - name: "Upload métriques CSV"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "runner-metrics"
          path: metrics/runner_metrics.csv
          retention-days: 30

      - name: " Métadonnées du contexte d'exécution"
        run: |
          echo "════════════════════════════════════════════"
          echo "        CONTEXTE COMPLET DU RUNNER"
          echo "════════════════════════════════════════════"
          echo ""
          echo "── IDENTITÉ DU RUN ──"
          echo "Run ID        : ${{ github.run_id }}"
          echo "Run number    : ${{ github.run_number }}"
          echo "Run attempt   : ${{ github.run_attempt }}"
          echo "Workflow      : ${{ github.workflow }}"
          echo ""
          echo "── DÉCLENCHEUR ──"
          echo "Event         : ${{ github.event_name }}"
          echo "Acteur        : ${{ github.actor }}"
          echo "Branche       : ${{ github.ref_name }}"
          echo "SHA du commit : ${{ github.sha }}"
          echo ""
          echo "── ENVIRONNEMENT ──"
          echo "Runner OS     : ${{ runner.os }}"
          echo "Runner arch   : ${{ runner.arch }}"
          echo "Workspace     : ${{ github.workspace }}"
          echo ""
          echo "── TIMESTAMPS SYSTÈME ──"
          echo "Heure runner  : $(date -u '+%Y-%m-%dT%H:%M:%S.%NZ')"
          echo "Uptime runner : $(uptime -p)"
          echo ""
          echo "── VARIABLES D'ENVIRONNEMENT CI ──"
          env | grep -E "^(GITHUB_|RUNNER_|CI)" | sort

      - name: " Démonstration stdout vs stderr"
        run: |
          echo "── Test flux stdout (normal) ──"
          echo "Ceci est sur stdout : visible en blanc"

          echo "── Test flux stderr (erreur) ──"
          echo "Ceci simule stderr : visible en rouge" >&2

          python3 -c "
          import sys
          print('Python → stdout : calcul OK')
          print('Python → stderr : avertissement mémoire', file=sys.stderr)
          sys.exit(0)  # exit 0 = succès malgré le message stderr
          "
          echo "── Le step continue car exit code = 0 ──"